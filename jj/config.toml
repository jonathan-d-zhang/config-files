"$schema" = "https://jj-vcs.github.io/jj/latest/config-schema.json"

[user]
name = "Jonathan Zhang"
email = "69145546+jonathan-d-zhang@users.noreply.github.com"

[ui]
diff-editor = ":builtin"
default-command = ["log"]
show-cryptographic-signatures = true

[signing]
behavior = "drop"
backend = "gpg"
key = "69145546+jonathan-d-zhang@users.noreply.github.com"

[git]
sign-on-push = true
colocate = false

[signing.backends.gpg]
program = "gpg2"
allow-expired-keys = false

[aliases]
pdiff = ["diff", "--from", "@--"]
pstatus = ["pdiff", "-s"]
pst = ["pstatus"]

l = ["log", "-r", "twig(@)", "--no-pager"]
ll = ["log", "-r", "branch(@)", "--no-pager"]
lll = ["log", "-r", "interesting", "--no-pager"]

mainline = ["rebase", "-A", "closest_pushable(@)"]

[template-aliases]
'format_timestamp(timestamp)' = 'timestamp.ago()'
